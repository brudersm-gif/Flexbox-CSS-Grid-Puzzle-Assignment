<!DOCTYPE html>
<html>
<head>
  <title>css-grid-layout</title>
</head>
<body>
  <style>
    section.grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr 1fr 3fr;
      column-gap: 5px;
      row-gap: 5px;
      background-color: purple;
    }
    section div.grid-item1, div.grid-item2, div.grid-item3, div.grid-item4 {
      background-color: rgba(255, 255, 255, 0.8);
      border: 1px solid black;
      text-align: center;
      padding: 5px;
      font-size: 1.2em;
    }
    section div.grid-item1 {
      grid-area: item1;
    }
    section div.grid-item2 {
      grid-area: item2;
    }
    section div.grid-item3 {
      grid-area: item3;
    }
    section div.grid-item4 {
      grid-area: item4;
    }
  </style>

  <section class="grid-container">
    <div class="grid-item1">item 1 here</div>
    <div class="grid-item2">Item 2 here</div>
    <div class="grid-item3">item 3 here</div>
    <div class="grid-item4">Item 4 here</div>
</body>
</html>
